<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flight Tools</title>

  <style>
    body {
      font-family: system-ui;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg,#020617,#172554,#581c87);
      color: white;
    }

    h1 { margin-bottom: 10px; }

    .card {
      background: rgba(255,255,255,0.95);
      color: black;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 15px;
    }

    a {
      display: block;
      margin-top: 8px;
      padding: 10px;
      border-radius: 10px;
      background: linear-gradient(135deg,#7c3aed,#06b6d4);
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Flight Tools</h1>
<p>Quick access before every flight</p>

<div class="card">
  <strong>LAANC / FAA</strong>
  <a href="https://www.faa.gov/uas/getting_started/laanc" target="_blank">FAA LAANC</a>
</div>

<div class="card">
  <strong>Aloft</strong>
  <a href="https://air.aloft.ai/" target="_blank">Open Aloft</a>
</div>

<div class="card">
  <strong>B4UFLY</strong>
  <a href="https://www.aloft.ai/air-aware/" target="_blank">Air Aware</a>
</div>

<div class="card">
  <strong>TFR</strong>
  <a href="https://tfr.faa.gov/tfr2/list.html" target="_blank">TFR List</a>
</div>

<div class="card">
  <strong>NOTAM</strong>
  <a href="https://notams.aim.faa.gov/notamSearch/" target="_blank">NOTAM Search</a>
</div>

<div class="card">
  <strong>Weather</strong>
  <a href="https://aviationweather.gov/" target="_blank">Aviation Weather</a>
</div>

<div class="card">
  <strong>DroneZone</strong>
  <a href="https://faadronezone-access.faa.gov/" target="_blank">FAA DroneZone</a>
</div>

<div class="card">
  <strong>Remote ID</strong>
  <a href="https://www.faa.gov/uas/getting_started/remote_id" target="_blank">Remote ID Info</a>
</div>

<div class="card">
  <strong>FAASafety</strong>
  <a href="https://www.faasafety.gov/" target="_blank">Training & WINGS</a>
</div>

</body>
</html>
